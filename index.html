<!DOCTYPE html>

<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }
            .header-container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                background-color: #bdaa90;
            }
            .title {
                display: block;
                width: 80%;
                margin-top: 2em;
                max-width: 600px;
            }
            .cat-img {
                width: 100%;
                max-width: 800px;
                flex: 1;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                text-align: center;
                color: #ffffff;
                font-size: 80px;
                -webkit-text-stroke: 3px #000000;
            }
            #p {
                background-image: url("imgs/p.png");
                background-position: center bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
            #op {
                width: 100%;
                background-image: url("imgs/op.png");
                background-position: center bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
        </style>
    </head>
    <body>
        <div class="header-container">
            <img src="imgs/popcat.svg" alt="POPCAT CLASSIC" class="title">
            <div class="cat-img" id="p">0</div>
            <div id="op"></div>
        </div>

        <script>
            let count = 0;
            let counterElement = document.getElementById('p');
            let popIndex = 1;

            function displayCounter() {
                counterElement.textContent = count;
            }

            function increment() {
                count++;
                counterElement.textContent = count;
                console.id ='op';
            }

            function playPopSound() {
                const audio = new Audio(`pops/pop${popIndex}.mp3`);
                audio.play();
                popIndex = popIndex % 4 + 1;
            }

            document.addEventListener('mousedown', function() {
                counterElement.style.backgroundImage = 'url("imgs/op.png")';
                increment();
                playPopSound();
            });

            document.addEventListener('mouseup', function() {
                counterElement.style.backgroundImage = 'url("imgs/p.png")';
            });
        </script>
    </body>
</html>
